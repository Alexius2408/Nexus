<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Ne<span>x</span>us</div>
        <button class="login-btn" onclick="window.location.href='login/login.html'">Sign In</button>
    </header>

    <main class="main-content">
        
        <section class="hero-section">
            <div class="hero-text">
                <h1>Chat with your friends on <span>NEXUS</span></h1>
                <h2>Anonymity comes first.</h2>
                <p>Chat with your friends in complete anonymity. Nexus is fully open-source. Stop handing over your data to massive multi-billion dollar corporations.</p>
            </div>
        </section>

        <section class="carousel-section">
            <div class="carousel-wrapper">
                <div class="carousel">
                    <div class="carousel-track" id="track">
                        
                        <div class="slide">
                            <img src="assets/fonts/images/settings.png" alt="Design">
                            <div class="slide-caption">Designen Sie jetzt Ihren Chatroom.</div>
                        </div>

                        <div class="slide">
                            <img src="" alt="Test">
                            <div class="slide-caption">Test</div>
                        </div>

                        <div class="slide">
                            <img src="" alt="Test">
                            <div class="slide-caption">Test</div>
                        </div>

                    </div>
                </div>

                <div class="carousel-nav">
                    <div class="nav-dot active" onclick="moveToSlide(0)"></div>
                    <div class="nav-dot" onclick="moveToSlide(1)"></div>
                    <div class="nav-dot" onclick="moveToSlide(2)"></div>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Nexus. All rights reserved.</p>
        </div>
    </footer>

<script src="script.js"></script>
</body>
</html>

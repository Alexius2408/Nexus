<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Ne<span>x</span>us</div>
        <button id="login-btn" class="login-btn">Anmelden</button>
    </header>

    <main class="main-content">
        
        <section class="hero-section">
            <div class="hero-text">
                <h1>Chate mit deinen Freunden über  <span>NEXUS</span></h1>
                <h2>Anonymität an erster Stelle.</h2>
                <p>Schreibe komplett anonym mit deinen Freunden. Nexus ist komlett Open-Source. Überlassen Sie nicht mehr Ihre Daten den großen Milliarden-Konzernen.</p>
            </div>
        </section>

        <section class="carousel-section">
            <div class="carousel-wrapper">
                <div class="carousel">
                    <div class="carousel-track" id="track">
                        
                        <div class="slide">
                            <img src="" alt="Test">
                            <div class="slide-caption">Test</div>
                        </div>

                        <div class="slide">
                            <img src="" alt="Test">
                            <div class="slide-caption">Test</div>
                        </div>

                        <div class="slide">
                            <img src="" alt="Test">
                            <div class="slide-caption">Test</div>
                        </div>

                    </div>
                </div>

                <div class="carousel-nav">
                    <div id="dot0" class="nav-dot active"></div>
                    <div id="dot1" class="nav-dot"></div>
                    <div id="dot2" class="nav-dot"></div>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div class="footer-content">
            <p>© 2026 Nexus. Alle Rechte vorbehalten.</p>
        </div>
    </footer>

<script src="script.js"></script>
</body>
</html>

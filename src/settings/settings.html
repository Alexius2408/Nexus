<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Einstellungen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Ne<span>x</span>us</div>
        <a href="../main.html" class="login-btn">Zurück</a>
    </header>

    <main class="main-content">
        
        <section class="hero-section">
            <div class="hero-text">
                <h1>DESIGN <span>ANPASSEN</span></h1>
                <h2>PASSE NEXUS AN ZU DEINEM STYLE</h2>
                <p>Ändere den Look der gesamten Website. Alle Änderungen werden sofort im Browser gespeichert und auf alle Unterseiten angewendet.</p>
            </div>
        </section>

        <section class="settings-section">
            <div class="settings-wrapper">
                
                <div class="setting-item">
                    <label for="bg-color">Hintergrundfarbe</label>
                    <select id="bg-color">
                        <option value="#0B1215">Standard</option>
                        <option value="#1a1a24">Midnight Blue</option>
                        <option value="#222222">Dark Gray</option>
                        <option value="#DBA2DB">Lavender</option>
                        <option value="#94A185">Matcha</option>
                        <option value="#3D041A">Wine</option>
                        <option value="#487557">Forest-Green</option>
                        <option value="#756948">Coffee</option>
                        <option value="#992B2B">Blood-Red</option>
                        <option value="#316B60">Teal</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="text-color">Schriftfarbe</label>
                    <select id="text-color">
                        <option value="#FAF9F6">Standard</option>
                        <option value="#ff6600">Nexus Orange</option>
                        <option value="#ffffff">Pure White</option>
                        <option value="#0B1215">Deep Black</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="accent-color">Akzentfarbe</label>
                    <select id="accent-color">
                        <option value="#ff6600">Standard</option>
                        <option value="#00ffcc">CyberCyan</option>
                        <option value="#ff00ff">Neon Pink</option>
                        <option value="#39ff14">Matrix Grün</option>
                        <option value="#FFB400">Gold</option>
                        <option value="#3825CC">Blue</option>
                        <option value="#CC2576">Pink</option>
                        <option value="#A33300">Dark Orange</option>
                        <option value="#1a1a24">Midnight Blue</option>
                        <option value="#222222">Dark Gray</option>
                        <option value="#DBA2DB">Lavender</option>
                        <option value="#94A185">Matcha</option>
                        <option value="#3D041A">Wine</option>
                        <option value="#487557">Forest-Green</option>
                        <option value="#756948">Coffee</option>
                        <option value="#992B2B">Blood-Red</option>
                        <option value="#316B60">Teal</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="font-family">Schriftart</label>
                    <select id="font-family">
                        <option value="'Segoe UI', Arial, sans-serif">Standard</option>
                        <option value="'Game_Paused', sans-serif">Retro-Games</option>
                        <option value="'Orbitron_Light', sans-serif">Futuristic light</option>
                        <option value="'Orbitron_Medium', sans-serif">Futuristic medium</option>
                    </select>
                </div>

                <div class="settings-actions">
                    <button id="reset-btn" class="reset-btn">Standard wiederherstellen</button>
                </div>

            </div>
        </section>

    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Nexus. Alle Rechte vorbehalten.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

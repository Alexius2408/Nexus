<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Ne<span>x</span>us</div>
        <a href="../main.html" class="login-btn">Back</a>
    </header>

    <main class="main-content">
        
        <section class="hero-section">
            <div class="hero-text">
                <h1>CUSTOMIZE <span>DESIGN</span></h1>
                <h2>TAILOR NEXUS TO YOUR STYLE</h2>
                <p>Change the look of the entire website. All changes are saved instantly in your browser and applied to all pages.</p>
            </div>
        </section>

        <section class="settings-section">
            <div class="settings-wrapper">
                
                <div class="setting-item">
                    <label for="bg-color">Background Color</label>
                    <select id="bg-color">
                        <option value="#0B1215">Default</option>
                        <option value="#1a1a24">Midnight Blue</option>
                        <option value="#222222">Dark Gray</option>
                        <option value="#DBA2DB">Lavender</option>
                        <option value="#94A185">Matcha</option>
                        <option value="#3D041A">Wine</option>
                        <option value="#487557">Forest-Green</option>
                        <option value="#756948">Coffee</option>
                        <option value="#992B2B">Blood-Red</option>
                        <option value="#316B60">Teal</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="text-color">Text Color</label>
                    <select id="text-color">
                        <option value="#FAF9F6">Default</option>
                        <option value="#ff6600">Nexus Orange</option>
                        <option value="#ffffff">Pure White</option>
                        <option value="#0B1215">Deep Black</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="accent-color">Accent Color</label>
                    <select id="accent-color">
                        <option value="#ff6600">Default</option>
                        <option value="#00ffcc">CyberCyan</option>
                        <option value="#ff00ff">Neon Pink</option>
                        <option value="#39ff14">Matrix Green</option>
                        <option value="#FFB400">Gold</option>
                        <option value="#3825CC">Blue</option>
                        <option value="#CC2576">Pink</option>
                        <option value="#A33300">Dark Orange</option>
                        <option value="#1a1a24">Midnight Blue</option>
                        <option value="#222222">Dark Gray</option>
                        <option value="#DBA2DB">Lavender</option>
                        <option value="#94A185">Matcha</option>
                        <option value="#3D041A">Wine</option>
                        <option value="#487557">Forest-Green</option>
                        <option value="#756948">Coffee</option>
                        <option value="#992B2B">Blood-Red</option>
                        <option value="#316B60">Teal</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label for="font-family">Font Family</label>
                    <select id="font-family">
                        <option value="'Segoe UI', Arial, sans-serif">Default</option>
                        <option value="'Game_Paused', sans-serif">Retro-Games</option>
                        <option value="'Orbitron_Light', sans-serif">Futuristic light</option>
                        <option value="'Orbitron_Medium', sans-serif">Futuristic medium</option>
                        <option value="'Old', sans-serif">Old German</option>
                    </select>
                </div>

                <div class="custom-color-area">
                    <h3>Add Custom Color</h3>
                    <div class="input-group">
                        <input type="text" id="custom-name" placeholder="Name">
                        <input type="text" id="custom-hex" placeholder="#FFFFFF">
                        <select id="target-dropdown">
                            <option value="bg">Background</option>
                            <option value="text">Text</option>
                            <option value="accent">Accent</option>
                        </select>
                        <button id="add-custom-colot-btn" class="add-btn">Add</button>
                    </div>
                </div>

                <div class="settings-actions">
                    <button id="reset-btn" class="reset-btn">Restore Defaults</button>
                </div>

            </div>
        </section>

    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Nexus. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

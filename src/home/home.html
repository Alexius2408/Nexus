<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav>
      <div id="user-logo"></div>
      <h1 id="chat-name"></h1>
      <div class="logo">Ne<span>x</span>us</div>
    </nav>

    <div id="chat_chat-rooms">
      <aside class="sidebar">
        <h3>Rooms</h3>
        <div id="chat-rooms"></div>
        <div id="add-new-chat">
          <svg
            id="plus-sign"
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="#e3e3e3"
          >
            <path
              d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z"
            />
          </svg>
        </div>
      </aside>

      <div class="main-content">
        <div id="popUp" class="popoUpWindow">
          <div class="popUpContext">
            <div id="header">
              <h3>Create Room</h3>
              <svg
                id="closeCreateChat"
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#e3e3e3"
              >
              <title>Close Create Room</title>
                <path
                  d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"
                />
              </svg>
            </div>
            <div id="InputButton">
              <input type="text" id="roomNameInput" placeholder="My Room" />
              <button id="createRoomBtn">Create</button>
            </div>
          </div>
        </div>
        <div class="box">
          <div id="messages-area">
            <p id="welcome-text" class="welcome-container">Welcome<br />to<br />Nexus!</p>
          </div>
          <div id="messageDiv" class="hidden">
            <input id="messageInput" type="text" placeholder="Nachricht ..." autocomplete="off" />
            <button id="sendBtn" aria-label="Send message">
              <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="currentColor">
                <path d="M120-160v-640l760 320-760 320Zm80-120 474-200-474-200v140l240 60-240 60v140Zm0 0v-400 400Z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="script.js"></script>
    <script type="module" src="create_chat_profiles.js"></script>
    <script type="module" src="make_new_chat.js"></script>
    <script type="module" src="create_chat_messages.js"></script>
    <script type="module" src="post_chat_messages.js"></script>
  </body>
</html>
